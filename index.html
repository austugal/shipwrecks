{id:135,name:"San Pedro Mártir",flag:"Spain",year:1596,captain:"Francisco de Cárdenas",cargo:"Mixed",treasureEstimate:"$6M",departure:"Havana",destination:"Cádiz",causeOfLoss:"Storm",shipType:"Galleon",tonnage:550,crew:270,lat:21.82,lng:-80.42,status:"Potential",historicalNotes:"Lost on the south coast of Cuba in a tropical storm. The shallow waters south of Cuba, known as the Gardens of the Queen, were deceptively dangerous for deep-draft galleons.",depth:null},
{id:136,name:"María Galante",flag:"France",year:1733,captain:"de Beaumont-Labouisse",cargo:"Mixed",treasureEstimate:"$2M",departure:"Rochefort",destination:"Guadeloupe",causeOfLoss:"Hurricane",shipType:"Frigate",tonnage:450,crew:220,lat:15.93,lng:-61.28,status:"Potential",historicalNotes:"Lost in the catastrophic 1733 hurricane season that devastated the lesser Antilles. The small island of Marie-Galante near Guadeloupe was named after an earlier vessel; this one was the third to bear the name.",depth:null},
{id:137,name:"Nuestra Señora de los Dolores",flag:"Spain",year:1751,captain:"José de la Cerda",cargo:"Silver",treasureEstimate:"$8M",departure:"Cartagena",destination:"Cádiz",causeOfLoss:"Storm",shipType:"Galleon",tonnage:600,crew:300,lat:15.31,lng:-61.42,status:"Potential",historicalNotes:"Wrecked on the rocks off Dominica in the lesser Antilles. Dominica's steep volcanic coastline and unpredictable currents made it one of the most dangerous islands in the Caribbean for ships seeking shelter.",depth:null},
{id:138,name:"Nuestra Señora del Carmen y San Antonio",flag:"Spain",year:1641,captain:"Mateo Moreno",cargo:"Silver",treasureEstimate:"$18M",departure:"Veracruz",destination:"Havana",causeOfLoss:"Hurricane",shipType:"Galleon",tonnage:550,crew:280,lat:24.12,lng:-77.31,status:"Potential",historicalNotes:"Part of the New Spain fleet caught in the 1641 hurricane in the Bahamas. The ship sank on the Bahama Bank in shallow water; contemporary salvors worked the site for years.",depth:null},
{id:139,name:"Notre-Dame de Victoire",flag:"France",year:1702,captain:"de Chavagnac",cargo:"Mixed",treasureEstimate:"$3M",departure:"Brest",destination:"Martinique",causeOfLoss:"Battle (Royal Navy)",shipType:"Frigate",tonnage:500,crew:250,lat:14.61,lng:-61.22,status:"Potential",historicalNotes:"Sunk by the Royal Navy during a skirmish off Martinique in the opening phase of the War of Spanish Succession. The Caribbean theater saw intense naval warfare during all of the 18th-century European conflicts.",depth:null},
{id:140,name:"Zeeland",flag:"Netherlands",year:1650,captain:"Pieter Claeszoon",cargo:"Mixed",treasureEstimate:"$4M",departure:"Amsterdam",destination:"Curaçao",causeOfLoss:"Reef",shipType:"Fluyt",tonnage:350,crew:80,lat:17.31,lng:-62.72,status:"Potential",historicalNotes:"Ran onto a reef off St. Kitts, then an English and French contested island. Dutch shipping to the Caribbean was increasingly challenged by the rival English and French colonial powers.",depth:null},
{id:141,name:"San José de las Animas",flag:"Spain",year:1733,captain:"Juan de Ochoa",cargo:"Silver",treasureEstimate:"$25M",departure:"Havana",destination:"Cádiz",causeOfLoss:"Hurricane",shipType:"Galleon",tonnage:600,crew:290,lat:23.21,lng:-74.51,status:"Discovered",historicalNotes:"One of the ships of the New Spain Fleet that was destroyed by a hurricane in the Bahamas in July 1733. The fleet of 20 ships was nearly entirely destroyed; contemporary Spanish salvage operations recovered much of the cargo.",depth:12},
{id:142,name:"El Sueco de Arizon",flag:"Spain",year:1733,captain:"Francisco de Echeverría",cargo:"Gold",treasureEstimate:"$15M",departure:"Havana",destination:"Cádiz",causeOfLoss:"Hurricane",shipType:"Galleon",tonnage:500,crew:250,lat:23.02,lng:-74.81,status:"Discovered",historicalNotes:"Lost in the same 1733 Bahamas hurricane fleet disaster. The unusual name refers to the Swedish builder who constructed the vessel. The 1733 fleet disaster has been extensively documented and partially excavated.",depth:8},
{id:143,name:"San Francisco de Asís",flag:"Spain",year:1733,captain:"Rodrigo Fernández",cargo:"Silver",treasureEstimate:"$20M",departure:"Havana",destination:"Cádiz",causeOfLoss:"Hurricane",shipType:"Galleon",tonnage:550,crew:270,lat:22.91,lng:-74.31,status:"Discovered",historicalNotes:"Third of the great 1733 Bahamas hurricane fleet wrecks. The entire New Spain fleet of 1733 was concentrated in the upper Keys and Bahama Bank when the storm struck.",depth:10},
{id:144,name:"Nuestra Señora de las Angustias",flag:"Spain",year:1733,captain:"Alonso de Herrera",cargo:"Mixed",treasureEstimate:"$10M",departure:"Havana",destination:"Cádiz",causeOfLoss:"Hurricane",shipType:"Galleon",tonnage:480,crew:240,lat:23.11,lng:-74.61,status:"Discovered",historicalNotes:"Fourth vessel of the 1733 fleet disaster. The concentrated loss of 17 ships of a 20-ship fleet in a single storm was the worst single-event treasure fleet loss in Spanish colonial history.",depth:9},
{id:145,name:"Capitana de Honduras",flag:"Spain",year:1621,captain:"Diego de Mercado",cargo:"Gold",treasureEstimate:"$14M",departure:"Trujillo",destination:"Havana",causeOfLoss:"Hurricane",shipType:"Galleon",tonnage:600,crew:310,lat:23.12,lng:-82.43,status:"Potential",historicalNotes:"The flagship of the Honduras fleet, caught in a hurricane approaching Havana. Honduran gold from the Tegucigalpa mines was concentrated in this single flagship.",depth:null},
{id:146,name:"San Felipe el Real",flag:"Spain",year:1679,captain:"Diego de Córdoba",cargo:"Silver",treasureEstimate:"$16M",departure:"Cartagena",destination:"Havana",causeOfLoss:"Pirate attack",shipType:"Galleon",tonnage:700,crew:350,lat:19.01,lng:-72.82,status:"Potential",historicalNotes:"Captured and sunk by the pirate Henry Morgan's last great raid. The buccaneers of Tortuga and Port Royal made the passage between Cartagena and Havana exceptionally dangerous in the 1670s.",depth:null},
{id:147,name:"Notre Dame de Grâce",flag:"France",year:1714,captain:"Henri Renault",cargo:"Mixed",treasureEstimate:"$3.5M",departure:"Brest",destination:"Martinique",causeOfLoss:"Storm",shipType:"Flûte",tonnage:400,crew:180,lat:16.22,lng:-61.44,status:"Potential",historicalNotes:"A French supply ship for the Martinique garrison lost in a tropical storm near Guadeloupe. France's sugar islands required constant resupply from the metropole.",depth:null},
{id:148,name:"Nuestra Señora de Consolación",flag:"Spain",year:1600,captain:"Pedro de Zubiaur",cargo:"Gold",treasureEstimate:"$7M",departure:"Cartagena",destination:"Havana",causeOfLoss:"Pirate attack",shipType:"Galleon",tonnage:500,crew:240,lat:22.91,lng:-82.71,status:"Potential",historicalNotes:"Captured by English buccaneers and deliberately sunk off the Cuban coast. The waters between Cuba and Hispaniola were heavily infested with English, French, and Dutch pirates in the early 17th century.",depth:null},
{id:149,name:"San Martín de la Victoria",flag:"Spain",year:1604,captain:"Cristóbal de Eraso",cargo:"Silver",treasureEstimate:"$9M",departure:"Cartagena",destination:"Cádiz",causeOfLoss:"Storm",shipType:"Galleon",tonnage:600,crew:300,lat:18.81,lng:-70.22,status:"Potential",historicalNotes:"Lost off the south coast of Hispaniola in a storm. The Silver Bank reef system north of Hispaniola and the channels south of the island were among the most dangerous stretches of the treasure fleet route.",depth:null},
{id:150,name:"Santa Catalina",flag:"Spain",year:1688,captain:"Juan de Aróstegui",cargo:"Mixed",treasureEstimate:"$4M",departure:"Cartagena",destination:"Havana",causeOfLoss:"Storm",shipType:"Galleon",tonnage:480,crew:240,lat:14.02,lng:-60.91,status:"Potential",historicalNotes:"Wrecked on the southern end of St Lucia in a storm. The lesser Antilles were known as the 'Windward Islands' precisely because the trade winds could drive ships onto their lee shores.",depth:null},
{id:151,name:"La Sorcière",flag:"France",year:1697,captain:"Jean-Baptiste Ducasse",cargo:"Mixed",treasureEstimate:"$2M",departure:"Port-de-Paix",destination:"Tortuga",causeOfLoss:"Battle",shipType:"Frigate",tonnage:300,crew:150,lat:14.71,lng:-61.02,status:"Potential",historicalNotes:"Sunk in the aftermath of the French raid on Cartagena. French buccaneers under Ducasse coordinated with regular French naval forces in the later 17th century.",depth:null},
{id:152,name:"HMS Wentworth",flag:"England",year:1740,captain:"Thomas Frankland",cargo:"Mixed",treasureEstimate:"$2M",departure:"Barbados",destination:"London",causeOfLoss:"Storm",shipType:"East Indiaman",tonnage:400,crew:120,lat:13.12,lng:-59.43,status:"Potential",historicalNotes:"Caught in a severe tropical storm southeast of Barbados returning from the Caribbean with sugar and rum. The trade wind route from the West Indies to Britain skirted the hurricane belt.",depth:null},
{id:153,name:"Princessin",flag:"Netherlands",year:1741,captain:"Jan van der Berg",cargo:"Mixed",treasureEstimate:"$3M",departure:"Amsterdam",destination:"Curaçao",causeOfLoss:"Reef",shipType:"Fluyt",tonnage:380,crew:85,lat:12.11,lng:-68.92,status:"Potential",historicalNotes:"Grounded on a reef approaching the Dutch colony of Curaçao. The island was the center of the Dutch Caribbean trade and slave network; the reef approaches to Willemstad were tricky.",depth:null},
{id:154,name:"Nuestra Señora del Milagro",flag:"Spain",year:1527,captain:"Francisco de Montejo",cargo:"Gold",treasureEstimate:"$6M",departure:"Cuba",destination:"Cádiz",causeOfLoss:"Hurricane",shipType:"Caravel",tonnage:200,crew:90,lat:22.41,lng:-84.62,status:"Potential",historicalNotes:"One of the earliest documented treasure losses in the Caribbean, carrying gold from the island conquest period before the systematic Aztec and Inca looting began.",depth:null},
{id:155,name:"Nuestra Señora de Belén",flag:"Spain",year:1503,captain:"Bartolomé Columbus",cargo:"Gold",treasureEstimate:"$2M",departure:"Veragua (Panama)",destination:"Hispaniola",causeOfLoss:"Worm damage",shipType:"Caravel",tonnage:80,crew:36,lat:17.98,lng:-76.78,status:"Potential",historicalNotes:"One of Columbus's fleet on his fourth voyage, so riddled with shipworm that she had to be abandoned in Jamaica. This voyage established the first European presence on the Central American mainland.",depth:null},
// ── GULF OF MEXICO (Veracruz, Campeche, Florida Straits) ──
{id:156,name:"Santa María de Yciar",flag:"Spain",year:1554,captain:"Damián de Torres",cargo:"Mixed",treasureEstimate:"$5M",departure:"Veracruz",destination:"Havana",causeOfLoss:"Hurricane",shipType:"Galleon",tonnage:500,crew:250,lat:27.02,lng:-97.32,status:"Discovered",historicalNotes:"One of four ships of the 1554 New Spain fleet lost on Padre Island, Texas, in the most significant archaeological shipwreck find in Texas. The Texas State Aquarium displays recovered cannon and anchors.",depth:3},
{id:157,name:"San Esteban",flag:"Spain",year:1554,captain:"Francisco del Huerto",cargo:"Silver",treasureEstimate:"$6M",departure:"Veracruz",destination:"Havana",causeOfLoss:"Hurricane",shipType:"Galleon",tonnage:400,crew:200,lat:27.11,lng:-97.41,status:"Discovered",historicalNotes:"Companion of the Santa María de Yciar in the 1554 Padre Island disaster. The wreck was found in 1967 and is one of the most completely excavated 16th-century Spanish ships in the Americas.",depth:2},
{id:158,name:"Espíritu Santo",flag:"Spain",year:1554,captain:"Álvaro de Cuadra",cargo:"Mixed",treasureEstimate:"$4M",departure:"Veracruz",destination:"Havana",causeOfLoss:"Hurricane",shipType:"Galleon",tonnage:350,crew:175,lat:26.91,lng:-97.22,status:"Discovered",historicalNotes:"Third vessel of the 1554 Padre Island fleet disaster. Survivors who made it ashore were killed by Karankawa Indians; only a handful returned to New Spain after months of wandering.",depth:2},
{id:159,name:"San Juan de Ullúa",flag:"Spain",year:1568,captain:"Juan de Escalante",cargo:"Silver",treasureEstimate:"$10M",departure:"Veracruz",destination:"Havana",causeOfLoss:"Battle (John Hawkins)",shipType:"Galleon",tonnage:600,crew:300,lat:19.22,lng:-96.12,status:"Potential",historicalNotes:"Sunk by the English privateer John Hawkins in the harbor of San Juan de Ulúa, Veracruz. The treacherous Spanish attack on Hawkins sparked a deep English-Spanish enmity that contributed to the Armada campaign.",depth:null},
{id:160,name:"El Nuevo Constante",flag:"Spain",year:1766,captain:"Antonio Amat",cargo:"Mixed",treasureEstimate:"$4M",departure:"Veracruz",destination:"Cádiz",causeOfLoss:"Storm",shipType:"Frigate",tonnage:400,crew:200,lat:29.11,lng:-90.52,status:"Discovered",historicalNotes:"Wrecked off the Louisiana coast in a Gulf storm. The wreck was excavated by Louisiana archaeologists in the 1980s, yielding the largest collection of 18th-century Spanish artifacts ever recovered in North America.",depth:4},
{id:161,name:"La Belle",flag:"France",year:1686,captain:"Jean Archambault",cargo:"Mixed",treasureEstimate:"$3M",departure:"Matagorda Bay",destination:"Montreal",causeOfLoss:"Storm",shipType:"Barque",tonnage:60,crew:6,lat:28.82,lng:-96.51,status:"Discovered",historicalNotes:"The supply ship of La Salle's failed Texas colony, sunk in Matagorda Bay in a storm. Discovered in 1995 and excavated under a coffer dam, it is one of the most important French colonial wrecks ever found. On display at the Bullock Museum in Austin.",depth:4},
{id:162,name:"San Antonio",flag:"Spain",year:1680,captain:"Mateo de Gamboa",cargo:"Mixed",treasureEstimate:"$2.5M",departure:"Veracruz",destination:"Havana",causeOfLoss:"Storm",shipType:"Galleon",tonnage:450,crew:220,lat:19.21,lng:-95.83,status:"Potential",historicalNotes:"Lost in a Gulf storm on the approach to Veracruz. The shoaly Gulf coast between Veracruz and Tampico was poorly charted and claimed many ships.",depth:null},
{id:163,name:"Nuestra Señora del Pilar",flag:"Spain",year:1708,captain:"José de Torres",cargo:"Silver",treasureEstimate:"$8M",departure:"Veracruz",destination:"Havana",causeOfLoss:"Storm",shipType:"Galleon",tonnage:550,crew:280,lat:19.81,lng:-90.51,status:"Potential",historicalNotes:"Lost on the Campeche Bank in a Gulf hurricane. The shallow Campeche Bank was one of the greatest hazards in the Gulf of Mexico; the bottom is flat and featureless, giving little warning of shallow water.",depth:null},
{id:164,name:"San Bernardo",flag:"Spain",year:1739,captain:"Francisco de Medina",cargo:"Mixed",treasureEstimate:"$3M",departure:"Veracruz",destination:"Havana",causeOfLoss:"Reef",shipType:"Brigantine",tonnage:200,crew:90,lat:20.51,lng:-90.21,status:"Potential",historicalNotes:"Ran onto the Campeche Bank at night with all hands lost. The Campeche Bank extends far offshore and its outer edge was a regular death trap for ships making for Veracruz.",depth:null},
{id:165,name:"Santa Ana de Lima",flag:"Spain",year:1620,captain:"Pedro de Ribera",cargo:"Silver",treasureEstimate:"$22M",departure:"Havana",destination:"Cádiz",causeOfLoss:"Hurricane",shipType:"Galleon",tonnage:700,crew:350,lat:24.62,lng:-81.51,status:"Potential",historicalNotes:"Lost in the Florida Straits in a hurricane. The Florida Straits were the final pinch point before the Atlantic; treasure fleets gathered in Havana and then made the northward run through the Straits in the hurricane-prone summer months.",depth:null},
{id:166,name:"San Lázaro",flag:"Spain",year:1614,captain:"Diego de Urdaneta",cargo:"Mixed",treasureEstimate:"$5M",departure:"Veracruz",destination:"Havana",causeOfLoss:"Storm",shipType:"Galleon",tonnage:500,crew:250,lat:21.02,lng:-87.21,status:"Potential",historicalNotes:"Lost off the Yucatan Peninsula near the Mesoamerican Barrier Reef, the second largest coral reef in the world. The reef extends for hundreds of miles and was poorly delineated on 17th-century charts.",depth:null},
{id:167,name:"El Infante",flag:"Spain",year:1733,captain:"Rodrigo de Torres",cargo:"Silver",treasureEstimate:"$30M",departure:"Havana",destination:"Cádiz",causeOfLoss:"Hurricane",shipType:"Ship-of-the-line",tonnage:900,crew:600,lat:24.81,lng:-81.41,status:"Discovered",historicalNotes:"The largest warship lost in the 1733 Florida Keys hurricane. A 70-gun ship-of-the-line, the Infante broke apart on the reef with the loss of nearly all hands. Mel Fisher's team found silver coins and cannon from this wreck.",depth:8},

const map = L.map('map', {
  center: [10, -30],
  zoom: 3,
  minZoom: 2,
  maxZoom: 10,
  zoomControl: false,
  attributionControl: false
});

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/">CARTO</a>',
  subdomains: 'abcd',
  maxZoom: 10
}).addTo(map);

L.control.zoom({ position: 'bottomright' }).addTo(map);
L.control.attribution({ position: 'bottomright', prefix: '' }).addTo(map);

// Cluster group
const clusters = L.markerClusterGroup({
  maxClusterRadius: 50,
  spiderfyOnMaxZoom: true,
  showCoverageOnHover: false,
  iconCreateFunction(c) {
    const n = c.getChildCount();
    return L.divIcon({
      html: `<div style="background:rgba(201,168,76,.55);border:2px solid rgba(201,168,76,.9);border-radius:50%;width:36px;height:36px;display:flex;align-items:center;justify-content:center;font-family:'Cinzel',serif;font-weight:700;color:#060d1a;font-size:.75rem">${n}</div>`,
      className: '',
      iconSize: [36, 36]
    });
  }
});
map.addLayer(clusters);

// Custom marker icons
function makeIcon(discovered) {
  const clr = discovered ? '#c9a84c' : '#7a5520';
  const border = discovered ? '#e8c96b' : '#a07030';
  return L.divIcon({
    html: `<div style="position:relative;width:22px;height:22px">
      <svg viewBox="0 0 24 24" style="width:22px;height:22px;filter:drop-shadow(0 0 4px ${clr}88)">
        <circle cx="12" cy="12" r="10" fill="${clr}" stroke="${border}" stroke-width="1.5" opacity=".9"/>
        <text x="12" y="16" text-anchor="middle" font-size="12" fill="#060d1a">⚓</text>
      </svg>
    </div>`,
    className: '',
    iconSize: [22, 22],
    iconAnchor: [11, 11]
  });
}

// ═══════════════════════════════════════════════
//  RENDER & FILTER
// ═══════════════════════════════════════════════
let activeMarkers = [];
let selectedId = null;

function eraMatch(wreck, era) {
  if (!era) return true;
  const [a, b] = era.split('-').map(Number);
  return wreck.year >= a && wreck.year <= b;
}

function renderWrecks() {
  const era = document.getElementById('f-era').value;
  const flag = document.getElementById('f-flag').value;
  const cargo = document.getElementById('f-cargo').value;
  const status = document.getElementById('f-status').value;

  clusters.clearLayers();
  activeMarkers = [];

  const filtered = WRECKS.filter(w =>
    eraMatch(w, era) &&
    (!flag || w.flag === flag) &&
    (!cargo || w.cargo === cargo) &&
    (!status || w.status === status)
  );

  filtered.forEach(w => {
    const m = L.marker([w.lat, w.lng], { icon: makeIcon(w.status === 'Discovered') });
    m.on('click', () => openDetail(w.id));
    const fe = FLAG_EMOJI[w.flag] || '🚩';
    m.bindTooltip(`<span style="font-family:'Cinzel',serif;font-size:.75rem;color:#e8c96b">${w.name}</span><br><span style="font-size:.65rem;color:#a89870">${fe} ${w.flag} · ${w.year}</span>`, {
      direction: 'top', offset: [0, -8],
      className: 'wreck-tip',
      permanent: false
    });
    clusters.addLayer(m);
    activeMarkers.push(m);
  });

  document.getElementById('wrecksCount').textContent = `Showing ${filtered.length} of ${WRECKS.length} wrecks`;
  updateStats(filtered);
}

// ═══════════════════════════════════════════════
//  STATS
// ═══════════════════════════════════════════════
function parseTreasure(str) {
  if (!str || str === '—') return 0;
  const s = str.replace(/[$,BMK]/g, '');
  let n = parseFloat(s);
  if (str.includes('B')) n *= 1e9;
  else if (str.includes('M')) n *= 1e6;
  else if (str.includes('K')) n *= 1e3;
  return n;
}
function formatTreasure(n) {
  if (n >= 1e9) return `$${(n/1e9).toFixed(1)}B+`;
  if (n >= 1e6) return `$${(n/1e6).toFixed(0)}M+`;
  return `$${(n/1e3).toFixed(0)}K`;
}
function updateStats(filtered) {
  const total = filtered.reduce((s, w) => s + parseTreasure(w.treasureEstimate), 0);
  const years = filtered.map(w => w.year);
  document.getElementById('st-total').textContent = filtered.length;
  document.getElementById('st-treasure').textContent = total > 0 ? formatTreasure(total) : '—';
  document.getElementById('st-range').textContent = years.length ? `${Math.min(...years)}–${Math.max(...years)}` : '—';
}

// ═══════════════════════════════════════════════
//  DETAIL PANEL
// ═══════════════════════════════════════════════
const FLAG_EMOJI = { Portugal:'🇵🇹', Spain:'🇪🇸', England:'🇬🇧', France:'🇫🇷', Netherlands:'🇳🇱', Denmark:'🇩🇰', Ottoman:'🟥' };
const CARGO_ICON = { Gold:'🪙', Silver:'🥈', Spices:'🌿', Slaves:'⛓', Mixed:'📦', Brazilwood:'🪵', Military:'⚔️', Troops:'⚔️' };

function getShipSVG(type) {
  const t = (type||'').toLowerCase();
  const g = '#c9a84c', o = '.55';
  if (t.includes('caravel'))
    return `<svg viewBox="0 0 90 44" width="90" height="44"><path d="M18 36 Q45 42 72 36 L68 28 L22 28 Z" fill="${g}" opacity="${o}"/><line x1="38" y1="28" x2="38" y2="6" stroke="${g}" stroke-width="1.5"/><line x1="54" y1="28" x2="54" y2="12" stroke="${g}" stroke-width="1.5"/><polygon points="38,7 38,26 58,18" fill="${g}" opacity=".3"/><polygon points="54,13 54,26 66,20" fill="${g}" opacity=".3"/></svg>`;
  if (t.includes('fluyt')||t.includes('urca')||t.includes('hulk'))
    return `<svg viewBox="0 0 90 44" width="90" height="44"><path d="M10 38 Q45 44 80 38 L76 28 L14 28 Z" fill="${g}" opacity="${o}"/><line x1="35" y1="28" x2="35" y2="8" stroke="${g}" stroke-width="1.5"/><line x1="52" y1="28" x2="52" y2="10" stroke="${g}" stroke-width="1.5"/><rect x="28" y="10" width="14" height="16" fill="${g}" opacity=".25"/><rect x="45" y="12" width="14" height="14" fill="${g}" opacity=".25"/></svg>`;
  if (t.includes('brig')||t.includes('sloop'))
    return `<svg viewBox="0 0 90 44" width="90" height="44"><path d="M22 36 Q45 42 68 36 L64 28 L26 28 Z" fill="${g}" opacity="${o}"/><line x1="38" y1="28" x2="38" y2="8" stroke="${g}" stroke-width="1.5"/><line x1="54" y1="28" x2="54" y2="12" stroke="${g}" stroke-width="1.5"/><rect x="31" y="10" width="14" height="16" fill="${g}" opacity=".3"/><rect x="47" y="14" width="14" height="12" fill="${g}" opacity=".3"/></svg>`;
  if (t.includes('frigate'))
    return `<svg viewBox="0 0 90 44" width="90" height="44"><path d="M8 34 Q45 40 82 34 L78 26 L12 26 Z" fill="${g}" opacity="${o}"/><line x1="28" y1="26" x2="28" y2="5" stroke="${g}" stroke-width="1.5"/><line x1="45" y1="26" x2="45" y2="3" stroke="${g}" stroke-width="1.5"/><line x1="62" y1="26" x2="62" y2="7" stroke="${g}" stroke-width="1.5"/><rect x="21" y="7" width="14" height="17" fill="${g}" opacity=".28"/><rect x="38" y="5" width="14" height="19" fill="${g}" opacity=".28"/><rect x="55" y="9" width="14" height="15" fill="${g}" opacity=".28"/></svg>`;
  // default: galleon / nau / carrack / ship-of-the-line
  return `<svg viewBox="0 0 90 44" width="90" height="44"><path d="M6 36 Q45 43 84 36 L80 26 L10 26 Z" fill="${g}" opacity="${o}"/><rect x="10" y="20" width="14" height="6" fill="${g}" opacity=".4"/><rect x="66" y="20" width="14" height="6" fill="${g}" opacity=".4"/><line x1="26" y1="26" x2="26" y2="4" stroke="${g}" stroke-width="1.5"/><line x1="45" y1="26" x2="45" y2="2" stroke="${g}" stroke-width="1.5"/><line x1="62" y1="26" x2="62" y2="6" stroke="${g}" stroke-width="1.5"/><rect x="19" y="6" width="14" height="18" fill="${g}" opacity=".3"/><rect x="38" y="4" width="14" height="20" fill="${g}" opacity=".3"/><rect x="55" y="8" width="14" height="16" fill="${g}" opacity=".3"/></svg>`;
}

function openDetail(id) {
  selectedId = id;
  const w = WRECKS.find(x => x.id === id);
  if (!w) return;
  const flagE = FLAG_EMOJI[w.flag] || '🚩';
  const cargoE = CARGO_ICON[w.cargo] || '📦';
  const statusClass = w.status === 'Discovered' ? 'discovered' : 'potential';
  const shipSVG = getShipSVG(w.shipType);
  document.getElementById('detail-body').innerHTML = `
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:8px">
      <div style="font-size:2.5rem;line-height:1">${flagE}</div>
      <div style="flex:1">
        <div id="detail-name" style="font-family:'Cinzel',serif;font-size:1.35rem;font-weight:900;color:#e8c96b;line-height:1.1;text-shadow:0 0 20px rgba(201,168,76,.3)">${w.name}</div>
        <div id="detail-subtitle" style="font-size:.62rem;letter-spacing:.18em;color:#7a6d50;text-transform:uppercase;margin-top:3px">${w.flag} · ${w.year} · ${w.shipType}</div>
      </div>
    </div>
    <div style="margin:4px 0 10px;opacity:.7">${shipSVG}</div>
    <span class="status-badge ${statusClass}">${w.status}</span>
    <div class="treasure-box">
      <div class="lbl">${cargoE} Estimated Treasure Value</div>
      <div class="val">${w.treasureEstimate}</div>
    </div>
    <div class="detail-grid">
      <div class="detail-field"><div class="lbl">Captain</div><div class="val">${w.captain}</div></div>
      <div class="detail-field"><div class="lbl">Year Lost</div><div class="val">${w.year}</div></div>
      <div class="detail-field"><div class="lbl">Departure</div><div class="val">${w.departure}</div></div>
      <div class="detail-field"><div class="lbl">Destination</div><div class="val">${w.destination}</div></div>
      <div class="detail-field"><div class="lbl">Cause of Loss</div><div class="val">${w.causeOfLoss}</div></div>
      <div class="detail-field"><div class="lbl">Ship Type</div><div class="val">${w.shipType}</div></div>
      <div class="detail-field"><div class="lbl">Tonnage</div><div class="val">${w.tonnage} tons</div></div>
      <div class="detail-field"><div class="lbl">Crew</div><div class="val">${w.crew} souls</div></div>
      <div class="detail-field"><div class="lbl">Primary Cargo</div><div class="val">${cargoE} ${w.cargo}</div></div>
      <div class="detail-field"><div class="lbl">Depth</div><div class="val">${w.depth != null ? w.depth + 'm' : 'Unknown'}</div></div>
      <div class="detail-field wide"><div class="lbl">Coordinates</div><div class="val">${w.lat.toFixed(2)}°, ${w.lng.toFixed(2)}°</div></div>
    </div>
    <div class="notes-section">
      <div class="lbl">Historical Notes</div>
      <p>${w.historicalNotes}</p>
    </div>
  `;
  document.getElementById('detail').classList.add('open');
  map.panTo([w.lat, w.lng]);
}

function closeDetail() {
  document.getElementById('detail').classList.remove('open');
  selectedId = null;
}

['f-era','f-flag','f-cargo','f-status'].forEach(id => {

// ═══════════════════════════════════════════════
//  WAVE CANVAS ANIMATION
// ═══════════════════════════════════════════════
(function initWaves() {
  const canvas = document.getElementById('waveCanvas');
  const ctx = canvas.getContext('2d');
  let W, H, particles = [];

  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  // Floating particles (like sea foam / stars)
  for (let i = 0; i < 80; i++) {
    particles.push({
      x: Math.random() * 2000,
      y: Math.random() * 1200,
      r: Math.random() * 1.5 + 0.3,
      speed: Math.random() * .3 + .1,
      alpha: Math.random() * .5 + .1,
      drift: (Math.random() - .5) * .2
    });
  }

  let t = 0;
  function draw() {
    ctx.clearRect(0, 0, W, H);
    t += .005;

    // Wave lines
    for (let w = 0; w < 5; w++) {
      ctx.beginPath();
      ctx.strokeStyle = `rgba(201,168,76,${.03 + w * .01})`;
      ctx.lineWidth = 1;
      for (let x = 0; x <= W; x += 4) {
        const y = H * (.3 + w * .12) + Math.sin(x * .008 + t + w) * 18 + Math.sin(x * .02 + t * 1.4) * 8;
        x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      }
      ctx.stroke();
    }

    // Particles
    particles.forEach(p => {
      p.y -= p.speed;
      p.x += p.drift;
      if (p.y < -5) { p.y = H + 5; p.x = Math.random() * W; }
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(201,168,76,${p.alpha})`;
      ctx.fill();
    });

    requestAnimationFrame(draw);
  }
  draw();
})();

</script>
